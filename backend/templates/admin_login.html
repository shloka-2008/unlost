{% extends "base.html" %}

{% block title %}Admin Login - UNLOST{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center fade-in-up" style="min-height: calc(100vh - 80px);">
    <div class="col-md-5 col-lg-4">
        <div class="card glass-form shadow-lg border-0 floating" style="animation-delay: 0.1s;">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle" style="width: 80px; height: 80px; background: rgba(239, 68, 68, 0.1);">
                        <i class="bi bi-shield-lock-fill fs-1" style="color: #ef4444;"></i>
                    </div>
                    <h3 class="card-title fw-bold mt-3 mb-1">Admin Portal</h3>
                    <p class="text-muted small">Restricted Access</p>
                </div>
                
                <form method="POST">
                    <div class="mb-4">
                        <label for="email" class="form-label small fw-bold text-muted">Admin Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-envelope-fill"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" placeholder="admin emailid" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label small fw-bold text-muted">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-key-fill"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 py-2 mb-3 fw-bold">Admin Login <i class="bi bi-box-arrow-in-right ms-2"></i></button>
                </form>
                
                <div class="position-relative mt-4 mb-4">
                    <hr class="text-secondary">
                    <div class="position-absolute top-50 start-50 translate-middle px-2" style="background-color: var(--surface-color);">
                        <span class="small text-muted">OR</span>
                    </div>
                </div>
                
                <p class="text-center small mb-0"><a href="{{ url_for('login') }}" class="text-muted text-decoration-none hover-primary"><i class="bi bi-arrow-left me-1"></i> Return to regular login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
