{% extends "base.html" %}

{% block title %}Register - UNLOST{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center fade-in-up" style="min-height: calc(100vh - 80px);">
    <div class="col-md-5 col-lg-4">
        <div class="card glass-form shadow-lg border-0 floating" style="animation-delay: 0.2s;">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle" style="width: 80px; height: 80px; background: rgba(16, 185, 129, 0.1);">
                        <i class="bi bi-person-plus-fill fs-1" style="color: #10b981;"></i>
                    </div>
                    <h3 class="card-title fw-bold mt-3 mb-1">Create Account</h3>
                    <p class="text-muted small">Join the community today</p>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label small fw-bold text-muted">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-at"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="johndoe" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label small fw-bold text-muted">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" placeholder="name@example.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label small fw-bold text-muted">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 mb-3 fw-bold">Register <i class="bi bi-arrow-right ms-2"></i></button>
                </form>
                
                <div class="position-relative mt-4 mb-4">
                    <hr class="text-secondary">
                    <div class="position-absolute top-50 start-50 translate-middle px-2" style="background-color: var(--surface-color);">
                        <span class="small text-muted">OR</span>
                    </div>
                </div>
                
                <a href="{{ url_for('login_google') }}" class="btn btn-outline-secondary w-100 py-2 mb-4 fw-bold text-dark d-flex align-items-center justify-content-center" style="border-color: #d1d5db; background-color: white;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" width="20" height="20" class="me-2">
                    Sign up with Google
                </a>
                
                <p class="text-center small mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-success fw-bold text-decoration-none">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
