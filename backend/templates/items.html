{% extends "base.html" %}

{% block title %}Items - UNLOST{% endblock %}

{% block content %}
<h1 class="mb-4 text-center hero-title" style="font-size: 2.5rem;">Explore Items</h1>

<div class="card mb-5 glass-form fade-in-up border-0">
    <div class="card-body">
        <h5 class="card-title mb-4 text-primary"><i class="bi bi-funnel-fill me-2"></i>Search & Filter</h5>
        <form method="GET" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label small text-muted mb-1">Search Keywords</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" name="q" placeholder="What are you looking for?" value="{{ request.args.get('q', '') }}">
                </div>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-1">Category</label>
                <select class="form-select" name="category">
                    <option value="">All Categories</option>
                    <option value="Electronics" {% if request.args.get('category') == 'Electronics' %}selected{% endif %}>Electronics</option>
                    <option value="Clothing" {% if request.args.get('category') == 'Clothing' %}selected{% endif %}>Clothing</option>
                    <option value="Jewelry" {% if request.args.get('category') == 'Jewelry' %}selected{% endif %}>Jewelry</option>
                    <option value="Other" {% if request.args.get('category') == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-1">Status</label>
                <select class="form-select" name="status">
                    <option value="">All Statuses</option>
                    <option value="Lost" {% if request.args.get('status') == 'Lost' %}selected{% endif %}>Lost</option>
                    <option value="Found" {% if request.args.get('status') == 'Found' %}selected{% endif %}>Found</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-1">Date</label>
                <input type="date" class="form-control" name="date" value="{{ request.args.get('date', '') }}">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100 py-2"><i class="bi bi-search me-2"></i>Apply filters</button>
            </div>
        </form>
    </div>
</div>

<div id="items-container" class="fade-in-up stagger-2">
    {% include 'partials/items_list.html' %}
</div>
{% endblock %}
