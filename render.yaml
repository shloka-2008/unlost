services:
  - type: web
    name: unlost-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
        placeholder: "mongodb+srv://..."
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
        placeholder: "Optional: Google OAuth Client ID"
      - key: GOOGLE_CLIENT_SECRET
        sync: false
        placeholder: "Optional: Google OAuth Client Secret"
      - key: GOOGLE_REDIRECT_URI
        sync: false
        placeholder: "https://your-frontend-domain.com/api/auth/google/callback"
