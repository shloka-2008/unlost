<header class="bg-white border-b border-gray-200 sticky top-0 z-40 w-full backdrop-blur-md bg-white/80">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer" routerLink="/">
        <div class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center text-white font-bold">U</div>
        <span class="font-bold text-xl tracking-tight text-gray-900">UNLOST</span>
      </div>

      <!-- Desktop Nav -->
      <nav class="hidden md:flex items-center gap-6">
        <a routerLink="/items" class="text-sm font-medium text-gray-600 hover:text-brand-600 transition-colors">Browse</a>
        <a routerLink="/report-lost" class="text-sm font-medium text-gray-600 hover:text-brand-600 transition-colors">Report Lost</a>
        <a routerLink="/report-found" class="text-sm font-medium text-gray-600 hover:text-brand-600 transition-colors">Report Found</a>
      </nav>

      <!-- User Actions -->
      <div class="hidden md:flex items-center gap-4">
        <!-- Guest -->
        <a mat-button routerLink="/login" class="!font-medium">Sign in</a>
        <a mat-flat-button color="primary" routerLink="/register" class="!font-medium !rounded-full">Get Started</a>

        <!-- Logged In User (Placeholder for now) -->
        <!-- <button mat-icon-button routerLink="/profile">
          <lucide-icon name="user" class="w-5 h-5 text-gray-600"></lucide-icon>
        </button> -->
      </div>

      <!-- Mobile menu button -->
      <div class="flex items-center md:hidden">
        <button mat-icon-button (click)="isMobileMenuOpen = !isMobileMenuOpen">
          <lucide-icon [name]="isMobileMenuOpen ? 'x' : 'menu'" class="w-6 h-6 text-gray-600"></lucide-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="md:hidden border-t border-gray-200" *ngIf="isMobileMenuOpen">
    <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-white">
      <a routerLink="/items" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-brand-600 hover:bg-gray-50" (click)="isMobileMenuOpen = false">Browse</a>
      <a routerLink="/report-lost" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-brand-600 hover:bg-gray-50" (click)="isMobileMenuOpen = false">Report Lost</a>
      <a routerLink="/report-found" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-brand-600 hover:bg-gray-50" (click)="isMobileMenuOpen = false">Report Found</a>
      
      <div class="mt-4 pt-4 border-t border-gray-200">
        <a routerLink="/login" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-brand-600 hover:bg-gray-50" (click)="isMobileMenuOpen = false">Sign in</a>
      </div>
    </div>
  </div>
</header>
